{% extends "games/base.html" %}

{% block title %}Lista gatunków{% endblock %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <h1>Lista gatunków</h1>
    <a href="{% url 'genre_add' %}" class="btn btn-dark">Dodaj gatunek</a>
</div>

{% if genres %}
<div class="list-group">
    {% for genre in genres %}
    <div class="list-group-item bg-secondary text-light border-0 shadow-sm mb-3 rounded d-flex justify-content-between align-items-center">
        <div>
            <a href="{% url 'genre_detail' genre.pk %}" class="text-light text-decoration-none fw-bold">
                {{ genre.name }}
            </a>
            <div class="text-light-emphasis small">
                {{ genre.description }}
            </div>
        </div>

        <div class="d-flex gap-2">
            <a href="{% url 'genre_edit' genre.pk %}" class="btn btn-secondary btn-sm">Edytuj</a>
            <a href="{% url 'genre_delete' genre.pk %}" class="btn btn-outline-danger btn-sm">Usuń</a>
        </div>
    </div>
    {% endfor %}
</div>
{% else %}
<div class="alert alert-dark">
    Brak gatunków.
</div>
{% endif %}

{% endblock %}
